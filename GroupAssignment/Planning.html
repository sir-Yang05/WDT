<!DOCTYPE html>
<html>
    <head>
        <title>Planning</title>
        <link rel="stylesheet" href="style.css">
        
        <style>
            :root {
                --font-body: 'DM Sans', sans-serif;
                --accent-sage: #7A987E;
                --primary-terra: #C46220;
                --bg-cream: #F7F5EE;
            }
            body {
                font-family: var(--font-body);
                background-color: var(--bg-cream);
                margin: 0;
            }
            .planner-container {
                display: flex;
                max-width: 1000px;
                margin: 40px auto;
                background: white;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
                overflow: hidden;
            }
            .calendar-panel {
                flex: 4;
                padding: 40px;
                background-color: #fcfbf9;
                border-right: 2px solid #eee;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .calendar-panel h2 {
                margin-top: 0;
                color: #333;
            }
            .inline-calendar {
                width: 100%;
                background: white;
                border: 2px solid var(--accent-sage, #7A987E);
                border-radius: 8px;
                padding: 15px;
                box-sizing: border-box;
                margin-bottom: 40px;
            }
            .calendar-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 15px;
            }
            .calendar-header h4 { 
                margin: 0; 
                color: var(--primary-terra, #C46220); 
                font-size: 1.1rem;
            }
            .calendar-header button {
                background: none; 
                border: none; 
                font-size: 1.5rem; 
                cursor: pointer; 
                color: #666;
            }
            .calendar-weekdays {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                text-align: center;
                font-size: 0.8rem;
                font-weight: bold;
                color: #999;
                margin-bottom: 10px;
            }
            .calendar-days-grid {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 5px;
                text-align: center;
            }
            .day-cell {
                padding: 8px 0;
                cursor: pointer;
                border-radius: 4px;
                font-size: 0.95rem;
                transition: 0.2s;
            }
            .day-cell:hover:not(.empty) { 
                background: var(--bg-cream, #F7F5EE); 
            }
            .day-cell.selected {
                background: var(--accent-sage, #7A987E);
                color: white;
                font-weight: bold;
            }
            .day-cell.empty {
                cursor: default;
            }
            .btn-review {
                margin-top: auto;
                padding: 12px 24px;
                background-color: white;
                border: 2px solid var(--primary-terra, #C46220);
                color: var(--primary-terra, #C46220);
                font-weight: bold;
                border-radius: 8px;
                cursor: pointer;
                transition: 0.3s;
            }
            .btn-review:hover {
                background-color: var(--primary-terra, #C46220);
                color: white;
            }
            .input-panel {
                flex: 6;
                padding: 40px;
            }
            .meal-section {
                margin-bottom: 30px;
            }
            .meal-section h3 {
                margin: 0 0 10px 0;
                color: var(--accent-sage, #7A987E);
            }
            .input-group {
                display: flex;
                gap: 10px;
            }
            .input-group input {
                flex: 1;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 6px;
                font-family: inherit;
            }
            .btn-add {
                background-color: var(--accent-sage, #7A987E);
                color: white;
                border: none;
                padding: 0 15px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 1.2rem;
            }
            .meal-list {
                list-style-type: none;
                padding: 0;
                margin: 10px 0 0 0;
            }
            .meal-list li {
                background: #eee;
                margin-bottom: 5px;
                padding: 8px 12px;
                border-radius: 4px;
                font-size: 0.9rem;
            }
            .btn-submit {
                width: 100%;
                padding: 15px;
                background-color: var(--primary-terra, #C46220);
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 1.1rem;
                font-weight: bold;
                cursor: pointer;
                margin-top: 20px;
            }
            .toast {
                position: fixed;
                bottom: 30px;
                right: 30px;
                background-color: var(--accent-sage, #7A987E);
                color: white;
                padding: 15px 25px;
                border-radius: 8px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.15);
                font-size: 1.1rem;
                font-weight: bold;
                opacity: 0;
                visibility: hidden;
                transform: translateY(20px);
                transition: all 0.3s ease;
                z-index: 1000;
            }
            .toast.show {
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
            }
        </style>
    </head>
    <body>
        <div class="header1">
            <header class="header">
                <section class="container_topic">
                    <h1><a href="Homepage.html">Co-kitchen</a></h1>
                </section>

                <section class="container_hpnavigationbar">
                    <ul class="navigationbar">
                        <li><a href="Recipe.html">Recipe</a></li>
                        <li><a href="Planning.html">Planning</a></li>
                        <li><a href="Calorie.html">Calorie</a></li>
                    </ul>
                </section>    
            </header>
        </div>

        <div class="main_container">
            <div class="planner-container">
                <div class="calendar-panel">
                    <h2>Select a Day</h2>
                    
                    <div class="inline-calendar">
                        <div class="calendar-header">
                            <button onclick="changeMonth(-1)">&#8249;</button>
                            <h4 id="month-year"></h4>
                            <button onclick="changeMonth(1)">&#8250;</button>
                        </div>
                        <div class="calendar-weekdays">
                            <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
                        </div>
                        <div class="calendar-days-grid" id="calendar-grid"></div>
                    </div>

                    <button class="btn-review" onclick="reviewPlans()">Review your plan</button>
                </div>
        
                <div class="input-panel">
                    <div class="meal-section">
                        <h3>Breakfast</h3>
                        <div class="input-group">
                            <input type="text" id="input-breakfast" placeholder="e.g. Avocado Toast">
                            <button class="btn-add" onclick="addMealItem('breakfast')">+</button>
                        </div>
                        <ul class="meal-list" id="list-breakfast"></ul>
                    </div>
        
                    <div class="meal-section">
                        <h3>Lunch</h3>
                        <div class="input-group">
                            <input type="text" id="input-lunch" placeholder="e.g. Grilled Salmon">
                            <button class="btn-add" onclick="addMealItem('lunch')">+</button>
                        </div>
                        <ul class="meal-list" id="list-lunch"></ul>
                    </div>
        
                    <div class="meal-section">
                        <h3>Dinner</h3>
                        <div class="input-group">
                            <input type="text" id="input-dinner" placeholder="e.g. Chicken Pasta">
                            <button class="btn-add" onclick="addMealItem('dinner')">+</button>
                        </div>
                        <ul class="meal-list" id="list-dinner"></ul>
                    </div>
        
                    <button class="btn-submit" onclick="saveDailyPlan()">Submit Plan</button>
                </div>
            </div>
        </div>

        <div id="custom-toast" class="toast">Plan saved successfully!</div>

    </body>
    <script src="planning.js"></script>
    <footer>&copy; <i>2026 WDT Group 03</i></footer>
</html
